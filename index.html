<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>1 Meter Cafe</title>
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>
    <main class="app">
      <section
        id="screen-ticket"
        class="screen screen-result"
        aria-label="Your number"
      >
        <p class="result-label result-label-top">Your number is:</p>
        <div class="ticket-number-wrap">
          <p
            id="ticket-number"
            class="ticket-number"
            aria-hidden="true"
          >
            _ _ _
          </p>
          <input
            id="ticket-number-input"
            class="ticket-number-input"
            type="text"
            name="ticketDigits"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="3"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            enterkeyhint="done"
            aria-label="输入三位号码"
          />
        </div>
        <button type="button" id="btn-confirm" class="btn-primary" disabled>
          Confirm
        </button>
      </section>

      <section
        id="screen-wait"
        class="screen screen-result"
        aria-label="Seating instructions"
        aria-hidden="true"
        hidden
      >
        <p class="result-label wait-message">
          Please wait at the seating area.<br />You're number will be called
          when you're table is ready.
        </p>
        <button type="button" id="btn-wait-back" class="btn-primary">
          <span>Back (</span><span id="wait-back-count">5</span><span> s)</span>
        </button>
      </section>
    </main>
    <button
      type="button"
      id="btn-enable-sound"
      class="sound-unlock-btn"
      hidden
    >
      点击启用叫号声音
    </button>
    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
    <script>
      firebase.initializeApp(window.FIREBASE_CONFIG);
    </script>
    <script src="script.js?v=15" defer></script>
  </body>
</html>
