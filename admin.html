<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#590f2d" />
    <title>管理 · 号数记录</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css?v=6" />
  </head>
  <body class="admin-body">
    <div class="admin-shell">
      <main class="admin-app">
        <div
          id="admin-duplicate-warning"
          class="admin-duplicate-warning admin-duplicate-warning-global"
          role="alert"
          hidden
        >
          <p
            id="admin-duplicate-warning-text"
            class="admin-duplicate-warning-text"
          ></p>
          <button
            type="button"
            id="btn-dismiss-duplicate-warning"
            class="admin-dismiss-warning"
          >
            知道了
          </button>
        </div>
        <section
          id="screen-admin-home"
          class="admin-screen"
          aria-label="管理首页"
        >
          <header class="admin-header">
            <h1 class="admin-title">后台</h1>
            <p class="admin-subtitle">点击下方按钮查看顾客确认的号码</p>
            <p
              id="admin-home-login-status"
              class="admin-home-login-status"
              aria-live="polite"
            ></p>
          </header>
          <div class="admin-home-actions">
            <button type="button" id="btn-browse-logs" class="btn-primary admin-btn-wide">
              浏览号数记录
            </button>
          </div>
        </section>

        <section
          id="screen-admin-list"
          class="admin-screen"
          aria-label="号数记录列表"
          aria-hidden="true"
          hidden
        >
          <header class="admin-list-header">
            <button type="button" id="btn-admin-back" class="admin-back-btn">
              ← 返回
            </button>
            <h2 class="admin-list-title">号数记录</h2>
          </header>
          <p id="admin-list-status" class="admin-list-status" aria-live="polite"></p>
          <div class="admin-list-toolbar">
            <button
              type="button"
              id="btn-clear-all-logs"
              class="admin-btn-clear-all"
            >
              清除所有记录
            </button>
          </div>
          <ul id="admin-log-list" class="admin-log-list"></ul>
        </section>
      </main>
    </div>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
    <script>
      firebase.initializeApp(window.FIREBASE_CONFIG);
    </script>
    <script src="admin.js?v=7" defer></script>
  </body>
</html>
